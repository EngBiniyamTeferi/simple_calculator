<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="container">
        <input id="store" placeholder="0">
        <div class="first_line">
            <button id="seven" onclick="press(7)" type="button" class="btn btn-light">7</button>
            <button id="eight"  onclick="press(8)"  type="button" class="btn btn-light">8</button>
            <button id="nine"  onclick="press(9)"  type="button" class="btn btn-light">9</button>
            <button id="plus"  onclick="press('+')"  type="button" class="btn btn-warning">+</button>
        </div>
        <div class="second_line">
            <button  id="four" onclick="press(4)"  type="button" class="btn btn-light">4</button>
            <button  id="five" onclick="press(5)"  type="button" class="btn btn-light">5</button>
            <button  id="six" onclick="press(6)"  type="button" class="btn btn-light">6</button>
            <button  id="minus" onclick="press('-')"  type="button" class="btn btn-warning">-</button>
        </div>
        <div class="third_line">
            <button  id="one"  onclick="press(1)" type="button" class="btn btn-light">1</button>
            <button  id="two"  onclick="press(2)" type="button" class="btn btn-light">2</button>
            <button  id="three"  onclick="press(3)" type="button" class="btn btn-light">3</button>
            <button  id="multiple"  onclick="press('*')" type="button" class="btn btn-warning">*</button>
        </div>
        <div class="fourth_line">
            <button  id="zero"  onclick="press('.')" type="button" class="btn btn-light">.</button>
            <button  id="zero"  onclick="press(0)" type="button" class="btn btn-light">0</button>
            <button  id="c" onclick="erase()"type="button" class="btn btn-danger">C</button>
            <button  id="division" onclick="press('/')"type="button" class="btn btn-warning">/</button>
        </div>
        <div class="fifth_line">
            <button  id="equal" onclick="equal()" type="button" class="btn btn-success">=</button>
        </div>

    <script src="script.js"></script>
</body>
</html>
